<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3b0"></stop>
      <stop offset="30%" stop-color="#ffd700"></stop>
      <stop offset="60%" stop-color="#ffc107"></stop>
      <stop offset="100%" stop-color="#b8860b"></stop>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="190" fill="#0a0a0a"></circle>

  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#gold)" stroke-width="8" filter="url(#glow)"></circle>

  <!-- Crown -->
  <path d="M140 90 L160 60 L200 90 L240 60 L260 90 L240 110 L160 110 Z" fill="url(#gold)" filter="url(#glow)"></path>

  <!-- Laurel Left -->
  <path d="M110 250 
           C80 220, 80 180, 110 150 
           C95 180, 95 220, 110 250 Z" fill="url(#gold)"></path>

  <path d="M120 260 
           C90 230, 90 190, 120 160 
           C105 190, 105 230, 120 260 Z" fill="url(#gold)"></path>

  <!-- Laurel Right -->
  <path d="M290 250 
           C320 220, 320 180, 290 150 
           C305 180, 305 220, 290 250 Z" fill="url(#gold)"></path>

  <path d="M280 260 
           C310 230, 310 190, 280 160 
           C295 190, 295 230, 280 260 Z" fill="url(#gold)"></path>

  <!-- Diamond center -->
  <polygon points="200,170 215,190 200,210 185,190" fill="url(#gold)" filter="url(#glow)"></polygon>

  <!-- Letter A -->
  <path d="M200 110 
           L120 300 
           L150 300 
           L170 250 
           L230 250 
           L250 300 
           L280 300 Z

           M180 220 
           L220 220 
           L200 170 Z" fill="url(#gold)" filter="url(#glow)"></path>

</svg>