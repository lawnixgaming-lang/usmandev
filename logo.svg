<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00ffcc"></stop>
      <stop offset="100%" stop-color="#7c5cff"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- FULL CIRCLE BACKGROUND -->
  <circle cx="64" cy="64" r="62" fill="#05060a"></circle>

  <!-- Outer glow ring -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="url(#g)" stroke-width="4" opacity="0.8" filter="url(#glow)"></circle>

  <!-- Inner badge -->
  <circle cx="64" cy="64" r="48" fill="rgba(10,12,20,0.9)" stroke="rgba(255,255,255,0.08)" stroke-width="2"></circle>

  <!-- Main symbol (bold) -->
  <text x="64" y="74" text-anchor="middle" font-size="44" font-family="monospace" fill="url(#g)" font-weight="700" filter="url(#glow)">
    &lt;/&gt;
  </text>

  <!-- Lock accent -->
  <rect x="54" y="34" width="20" height="16" rx="4" fill="none" stroke="url(#g)" stroke-width="2"></rect>
  <path d="M57 34 v-6 a7 7 0 0 1 14 0 v6" fill="none" stroke="url(#g)" stroke-width="2"></path>
</svg>